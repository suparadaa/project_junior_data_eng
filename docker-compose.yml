version: "3.8"

services:
  db:
    image: postgres:15
    container_name: brokerage_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brokerage
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brokerage"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: brokerage_pipeline
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: brokerage
      DB_USER: postgres
      DB_PASSWORD: postgres